version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: booking_platform_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-booking_platform}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Uncomment the following to run the app as well
  # api:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: booking_platform_api
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-booking_platform}?schema=public
  #     PORT: 3000
  #     NODE_ENV: production
  #   depends_on:
  #     db:
  #       condition: service_healthy

volumes:
  postgres_data:
